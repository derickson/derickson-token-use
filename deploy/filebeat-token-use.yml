# Example Filebeat / Elastic Agent filestream input for token-use output.
# Drop this into your Filebeat config (or adapt for an Elastic Agent custom-logs
# integration). The collector writes one JSON object per line, already in an
# ECS-friendly shape, so we parse each line and keep its fields as-is.

filebeat.inputs:
  - type: filestream
    id: token-use
    enabled: true
    paths:
      # Linux default:
      - ${HOME}/.local/share/token-use/logs/*.ndjson
      # macOS default:
      - ${HOME}/Library/Application Support/token-use/logs/*.ndjson
    parsers:
      - ndjson:
          target: ""            # promote parsed fields to the top level
          overwrite_keys: true
          add_error_key: true
          # The record's own @timestamp is the event time.
          # (Filebeat maps a top-level @timestamp automatically.)

# Idempotent ingestion: use the per-call message_id as the document _id so that a
# re-read after an unclean restart updates rather than duplicates. Turn records
# have no message_id; let Elasticsearch auto-assign their _id.
#
# Configure this in your output (example for the Elasticsearch output):
#
# output.elasticsearch:
#   hosts: ["https://your-es:9200"]
#   pipeline: token-use-id        # optional ingest pipeline below
#
# Optional ingest pipeline to set _id = claude.message_id for call records:
#
# PUT _ingest/pipeline/token-use-id
# {
#   "processors": [
#     { "set": { "if": "ctx.event?.dataset == 'claude_code.token_usage'",
#                "field": "_id", "value": "{{claude.message_id}}" } }
#   ]
# }
